{% extends "layouts/base.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div style="text-align:center;padding:80px 20px;">
    <h1 style="font-size:6rem;font-weight:900;color:var(--danger);margin-bottom:16px;">500</h1>
    <h2 style="font-size:1.5rem;margin-bottom:16px;">Something Went Wrong</h2>
    <p style="color:var(--text-secondary);margin-bottom:32px;">Our servers encountered an error. Please try again later.</p>
    <a href="{{ url_for('home.index') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
