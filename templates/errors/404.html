{% extends "layouts/base.html" %}
{% block title %}404 - Not Found{% endblock %}
{% block content %}
<div style="text-align:center;padding:80px 20px;">
    <h1 style="font-size:6rem;font-weight:900;color:var(--primary);margin-bottom:16px;">404</h1>
    <h2 style="font-size:1.5rem;margin-bottom:16px;">Page Not Found</h2>
    <p style="color:var(--text-secondary);margin-bottom:32px;">The page you're looking for doesn't exist.</p>
    <a href="{{ url_for('home.index') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
