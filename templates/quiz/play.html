{% extends "layouts/base.html" %}

{% block title %}Playing - {{ app_name }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/quiz.css') }}">
{% endblock %}

{% block content %}
<div class="quiz-container" id="quizContainer">
    <div style="text-align:center;padding:48px;">
        <div style="width:48px;height:48px;border:4px solid var(--surface);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px;"></div>
        <h2 style="font-size:1.5rem;font-weight:700;">Loading Game...</h2>
        <p style="color:var(--text-secondary);margin-top:8px;">Get ready!</p>
    </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
window.roomCode = '{{ room.code }}';
initQuiz('{{ room.code }}');
</script>
{% endblock %}
